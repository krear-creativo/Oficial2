<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000">
    <defs>
        <radialGradient id="bg6" cx="50%" cy="50%" r="70%">
            <stop offset="0%" stop-color="#001240"/>
            <stop offset="50%" stop-color="#00021a"/>
            <stop offset="100%" stop-color="#000000"/>
        </radialGradient>
        <linearGradient id="glow6" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#D9E73C"/>
            <stop offset="100%" stop-color="#001ccc"/>
        </linearGradient>
        <filter id="blur6">
            <feGaussianBlur stdDeviation="40"/>
        </filter>
        <filter id="glow-effect6">
            <feGaussianBlur stdDeviation="15" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    
    <!-- Background -->
    <rect width="800" height="1000" fill="url(#bg6)"/>
    
    <!-- Ambient glowing orbs -->
    <circle cx="400" cy="500" r="200" fill="#D9E73C" opacity="0.1" filter="url(#blur6)"/>
    <circle cx="200" cy="200" r="150" fill="#0010a0" opacity="0.4" filter="url(#blur6)"/>

    <!-- Floating abstract geometric directional paths -->
    <path d="M 0,100 L 250,300 L 400,100 L 800,200" fill="none" stroke="rgba(217, 231, 60, 0.3)" stroke-width="4" stroke-linecap="round"/>
    <path d="M 900,800 L 600,600 L 450,850 L 0,800" fill="none" stroke="#0010a0" stroke-width="6" opacity="0.5" filter="url(#glow-effect6)"/>
    
    <circle cx="400" cy="100" r="8" fill="#D9E73C" filter="url(#glow-effect6)"/>
    <circle cx="450" cy="850" r="8" fill="#FFFFFF" filter="url(#glow-effect6)"/>

    <!-- Compass / Direction element -->
    <g transform="translate(400, 500)">
        <!-- Outer rings -->
        <circle cx="0" cy="0" r="250" fill="none" stroke="#0010a0" stroke-width="2" stroke-dasharray="10 15"/>
        <circle cx="0" cy="0" r="200" fill="none" stroke="rgba(217, 231, 60, 0.2)" stroke-width="1"/>
        <circle cx="0" cy="0" r="180" fill="none" stroke="#00024D" stroke-width="20" opacity="0.8"/>
        
        <!-- Large Crosshair -->
        <line x1="-300" y1="0" x2="300" y2="0" stroke="rgba(255,255,255,0.05)" stroke-width="2"/>
        <line x1="0" y1="-350" x2="0" y2="350" stroke="rgba(255,255,255,0.05)" stroke-width="2"/>

        <!-- 3D Compass needle -->
        <g transform="rotate(45)">
            <!-- North (glowing) -->
            <polygon points="0,-180 30,0 0,20" fill="#D9E73C" filter="url(#glow-effect6)"/>
            <polygon points="0,-180 -30,0 0,20" fill="#b0bd00"/>
            
            <!-- South (dark) -->
            <polygon points="0,180 30,0 0,-20" fill="#0010a0"/>
            <polygon points="0,180 -30,0 0,-20" fill="#000430"/>
        </g>
        
        <!-- Center pivot -->
        <circle cx="0" cy="0" r="16" fill="#FFFFFF" filter="url(#glow-effect6)"/>
        <circle cx="0" cy="0" r="6" fill="#00024D"/>
    </g>
</svg>
